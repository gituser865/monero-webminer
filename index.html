<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monero Mining Dashboard</title>

<!-- Mining Script -->
<script src="script.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.dashboard { width:95%; max-width:1100px; }

.header { text-align:center; margin-bottom:40px; }

.header h1 { font-size:2.5rem; font-weight:700; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card {
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover { transform:translateY(-5px); }

.card h3 { margin-bottom:15px; opacity:0.8; }

.stat { font-size:1.8rem; font-weight:700; }

.controls { margin-top:40px; text-align:center; }

button {
    padding:14px 30px;
    border-radius:50px;
    border:none;
    font-size:1rem;
    font-weight:600;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn { background:#00c853; color:white; }
.start-btn:hover { background:#00e676; }

.stop-btn { background:#d50000; color:white; }
.stop-btn:hover { background:#ff1744; }

.footer { text-align:center; margin-top:40px; opacity:0.6; font-size:0.9rem; }
</style>
</head>

<body>

<div class="dashboard">

<div class="header">
<h1>Monero Mining Dashboard</h1>
<p>Mine XMR and track performance live</p>
</div>

<div class="grid">
<div class="card">
<h3>Live Hashrate</h3>
<div class="stat" id="hashrate">0 H/s</div>
</div>

<div class="card">
<h3>XMR Price</h3>
<div class="stat" id="xmrprice">$0</div>
</div>

<div class="card">
<h3>Points (1 = 0.01 USDT)</h3>
<div class="stat" id="points">0</div>
</div>

<div class="card">
<h3>Status</h3>
<div class="stat" id="status">Stopped</div>
</div>
</div>

<div class="controls">
<button class="start-btn" onclick="startMiner()">Start Mining</button>
<button class="stop-btn" onclick="stopMiner()">Stop Mining</button>
</div>

<div class="footer">
Mining to configured wallet via pool.
</div>

</div>

<script>
/* ==============================
   MINING CONFIGURATION
================================ */

var pool = "gulf.moneroocean.stream:10001";
var walletAddress = "4657q4dnsjLWtzeW4XN3wG9swFumWAZB9i1pegTLMxVAQy5E5AE8uif42kkHWcWc9vDcLUmzeCf3pV7mmrJQQqqe84dtASi";
var workerId = "WebMiner-" + Math.floor(Math.random()*9999);
var threads = -1;
var password = "";

/* ==============================
   MINING CONTROL
================================ */

var mining = false;
var hashInterval = null;
var priceInterval = null;
var currentHashRate = 0;
var xmrPrice = 0;

function startMiner() {

    if (mining) return;

    startMining(pool, walletAddress, workerId, threads, password);

    mining = true;

    document.getElementById("status").innerText = "Mining...";
    document.getElementById("status").style.color = "#00e676";

    startLiveUpdates();
}

function stopMiner() {

    if (!mining) return;

    stopMining();
    mining = false;

    document.getElementById("status").innerText = "Stopped";
    document.getElementById("status").style.color = "#ff1744";

    clearInterval(hashInterval);
    clearInterval(priceInterval);

    document.getElementById("hashrate").innerText = "0 H/s";
}

/* ==============================
   LIVE UPDATES
================================ */

function startLiveUpdates() {

    hashInterval = setInterval(function () {

        if (typeof getHashesPerSecond === "function") {
            currentHashRate = getHashesPerSecond();
            if (!isNaN(currentHashRate)) {
                document.getElementById("hashrate").innerText =
                    currentHashRate.toFixed(2) + " H/s";
            }
        }

        updatePoints();

    }, 2000);

    fetchXMRPrice();
    priceInterval = setInterval(fetchXMRPrice, 15000);
}

async function fetchXMRPrice() {
    try {
        const response = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=monero&vs_currencies=usd"
        );
        const data = await response.json();
        xmrPrice = data.monero.usd;
        document.getElementById("xmrprice").innerText = "$" + xmrPrice;
    } catch (err) {
        console.log("Price fetch error");
    }
}

function updatePoints() {
    if (!xmrPrice || !currentHashRate) return;

    var xmrPerSecond = currentHashRate / 1000000000000;
    var usdtValue = xmrPerSecond * xmrPrice;
    var points = usdtValue / 0.01;

    document.getElementById("points").innerText = points.toFixed(6);
}
</script>

</body>
</html>
